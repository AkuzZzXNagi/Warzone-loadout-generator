<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Warzone BO7 Generator</title>
<style>
body {
  font-family: Arial;
  background: radial-gradient(ellipse at bottom, #0b0c2a 0%, #000000 100%);
  color: white;
  text-align: center;
  overflow: hidden;
}
  
.stars {
  position: fixed;
  width: 200%;
  height: 200%;
  background: transparent url("https://www.transparenttextures.com/patterns/stardust.png") repeat;
  animation: moveStars 60s linear infinite;
  z-index: -1;
}
  
.stars2 {
  position: fixed;
  width: 200%;
  height: 200%;
  background: transparent url("https://www.transparenttextures.com/patterns/stardust.png") repeat;
  animation: moveStars 120s linear infinite;
  opacity: 0.5;
  z-index: -1;
}
  
.twinkling {
  position: fixed;
  width: 200%;
  height: 200%;
  background: transparent url("https://www.transparenttextures.com/patterns/stardust.png") repeat;
  animation: moveStars 200s linear infinite, twinkle 3s infinite alternate;
  opacity: 0.4;
  z-index: -1;
}
  
@keyframes moveStars {
  from {
    transform: translate(0, 0);
  }
  to {
    transform: translate(-500px, -500px);
  }
}
  
@keyframes twinkle {
  0% { opacity: 0.2; }
  50% { opacity: 0.6; }
  100% { opacity: 0.2; }
}
  
h1 {margin:20px;font-size:32px;letter-spacing:2px}
button {
  padding:15px 30px;font-size:18px;border:none;border-radius:8px;
  background:#22c55e;color:black;font-weight:bold;cursor:pointer;
  box-shadow:0 0 15px #22c55e;
}
.wheel {
  width:220px;height:220px;border-radius:50%;margin:30px auto;
  background:conic-gradient(#22c55e,#38bdf8,#f59e0b,#ef4444,#a855f7);
  transition:transform 3s ease-out;
}
.card {
  background:rgba(0,0,0,0.9);
  border:1px solid #22c55e;border-radius:12px;
  padding:20px;margin:20px auto;width:380px;
}
.weapon {font-size:26px;color:#22c55e;margin-bottom:10px}
img {width:100%;border-radius:10px}
.accessory {
  background:rgba(34,197,94,0.1);
  border-left:5px solid #22c55e;
  padding:10px;margin:8px 0;font-size:20px;text-align:left;
}
.credit {
  margin-top:-10px;
  font-size:18px;
  color:#a7f3d0;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  text-shadow:0 0 8px #22c55e;
  animation:fadeIn 1s ease;
}
.logo {
  width:28px;
  height:28px;
  border-radius:50%;
  box-shadow:0 0 10px #22c55e, 0 0 20px #22c55e;
  animation:neonPulse 1.5s infinite alternate;
}
.name {
  color:#22c55e;
  font-weight:bold;
  position:relative;
  animation:glitch 1.5s infinite;
}
@keyframes fadeIn {
  from {opacity:0; transform:translateY(-10px);} 
  to {opacity:1; transform:translateY(0);} 
}

@keyframes neonPulse {
  from { box-shadow:0 0 5px #22c55e, 0 0 10px #22c55e; }
  to { box-shadow:0 0 20px #22c55e, 0 0 40px #22c55e; }
}

@keyframes glitch {
  0% { text-shadow:2px 0 red, -2px 0 blue; }
  20% { text-shadow:-2px 0 red, 2px 0 blue; }
  40% { text-shadow:2px 2px red, -2px -2px blue; }
  60% { text-shadow:-2px -2px red, 2px 2px blue; }
  80% { text-shadow:2px 0 red, -2px 0 blue; }
  100% { text-shadow:none; }
}

.shooting-star {
  position: fixed;
  width: 3px;
  height: 100px;
  background: linear-gradient(white, transparent);
  opacity: 0;
  transform: rotate(45deg);
  z-index: 0;
}
  
</style>
</head>

const perks = {
  perk1: [
    "Sergent instructeur",
    "Pillard",
    "Examinateur",
    "Alpiniste",
    "Médecin de terrain"
  ],
  perk2: [
    "Sprinteur",
    "Armure réactive",
    "Régénération rapide",
    "Berserker",
    "Momentum"
  ],
  perk3: [
    "Survivant",
    "Adaptation",
    "Trempé",
    "Fantôme",
    "Chasseur"
  ]
};
  
function generatePerks(){
  let p1 = perks.perk1[Math.floor(Math.random()*perks.perk1.length)];
  let p2 = perks.perk2[Math.floor(Math.random()*perks.perk2.length)];
  let p3 = perks.perk3[Math.floor(Math.random()*perks.perk3.length)];

  return `
  <div class="card">
    <h3>🎯 Atouts</h3>
    <div class="accessory">🥇 Atout 1 : ${p1}</div>
    <div class="accessory">🥈 Atout 2 : ${p2}</div>
    <div class="accessory">🥉 Atout 3 : ${p3}</div>
  </div>`;
}
  
let lastClassHTML = "";

function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min}

function generateWeapon(w){
let list=[];
if(w.lunette) list.push({n:"🔭 Lunette",v:()=>rand(w.lunette[0],w.lunette[1])});
if(w.canon) list.push({n:"📏 Canon",v:()=>rand(w.canon[0],w.canon[1])});
if(w.accessoireCanon) list.push({n:"🧩 Accessoire",v:()=>rand(w.accessoireCanon[0],w.accessoireCanon[1])});
if(w.chargeur) list.push({n:"📦 Chargeur",v:()=>rand(w.chargeur[0],w.chargeur[1])});
if(w.poignee) list.push({n:"✋ Poignée",v:()=>rand(w.poignee[0],w.poignee[1])});
if(w.crosse) list.push({n:"🏹 Crosse",v:()=>rand(w.crosse[0],w.crosse[1])});
if(w.laser) list.push({n:"🎯 Laser",v:()=>rand(w.laser[0],w.laser[1])});
if(w.mod) list.push({n:"⚙️ Mod",v:()=>rand(w.mod[0],w.mod[1])});

let pick=[...list].sort(()=>Math.random()-0.5).slice(0,5);

let html=`<div class='card'><div class='weapon'>${w.name}</div><img src='${w.img || "https://via.placeholder.com/400x200?text="+encodeURIComponent(w.name)}'>`;
pick.forEach(a=>{html+=`<div class='accessory'>${a.n}: ${a.v()}</div>`});
html+="</div>";
return html;
}

function spin(){
let wheel=document.getElementById("wheel");
wheel.style.transform=`rotate(${Math.random()*1080}deg)`;

setTimeout(()=>{
let w1=weapons[Math.floor(Math.random()*weapons.length)];
let w2;

do {
  w2 = weapons[Math.floor(Math.random()*weapons.length)];
} while (w2.name === w1.name || w2.cat === w1.cat);

lastClassHTML =
"<h2>Classe générée</h2>"+
"<h3>Principale</h3>"+generateWeapon(w1)+
"<h3>Secondaire</h3>"+generateWeapon(w2)+
generatePerks();

document.getElementById("result").innerHTML = lastClassHTML;

},3000);
}

function saveClass(){
if(!lastClassHTML){
  alert("⚠️ Génère une classe d'abord !");
  return;
}

let classes = JSON.parse(localStorage.getItem("classes") || "[]");

classes.push({
  id: Date.now(),
  content: lastClassHTML
});

localStorage.setItem("classes", JSON.stringify(classes));

alert("✅ Classe sauvegardée !");
}
  
function loadClasses(){
let classes = JSON.parse(localStorage.getItem("classes") || "[]");

if(classes.length === 0){
  document.getElementById("saved").innerHTML = "<p>Aucune classe sauvegardée</p>";
  return;
}

let html = "<h2>📂 Mes classes</h2>";

classes.forEach((c,i)=>{
  html += `
  <div class="card">
    <h3>Classe ${i+1}</h3>
    ${c.content}
    <button onclick="deleteClass(${c.id})">❌ Supprimer</button>
  </div>`;
});

document.getElementById("saved").innerHTML = html;
}
  
function deleteClass(id){
let classes = JSON.parse(localStorage.getItem("classes") || "[]");

classes = classes.filter(c => c.id !== id);

localStorage.setItem("classes", JSON.stringify(classes));

loadClasses();
}
  
function clearClasses(){
if(confirm("Supprimer toutes les classes ?")){
  localStorage.removeItem("classes");
  loadClasses();
}
}

function createShootingStar() {
  const star = document.createElement("div");
  star.className = "shooting-star";

  document.body.appendChild(star);

  const startX = Math.random() * window.innerWidth;
  const startY = Math.random() * window.innerHeight;

  star.style.left = startX + "px";
  star.style.top = startY + "px";

  star.style.opacity = 1;

  star.animate([
    { transform: "translate(0,0) rotate(45deg)", opacity: 1 },
    { transform: "translate(600px,600px) rotate(45deg)", opacity: 0 }
  ], {
    duration: 1000,
    easing: "ease-out"
  });

  // Supprime l’étoile après animation
  setTimeout(() => {
    star.remove();
  }, 1000);
}

// étoiles aléatoires
setInterval(() => {
  createShootingStar();
}, 2000);
  
</script>

</html>
